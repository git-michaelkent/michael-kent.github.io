# Flock & Private Surveillance
<iframe width="100%" height="480" src="https://drive.google.com/file/d/1lKDx0MQVWpTT-khDh_KZDoYDyD-IvVbW/preview"></iframe>
<p></p>

In this video I discuss the technological and societal implications of America's ever expanding private surveillance network. For decades the United States has broadened it's intelligence infrastructure in the name of combating terrorism. This push gave permission for corporations to collect, store, and eventually sell enormous troves of personal information. Over the video’s four chapters, I combine my sociology and cybersecurity studies to explore this system’s history, means, ends - and perhaps most importantly - some actionable solutions.

I made this video in March 2026 for a Cybersecurity course. This was my first attempt at a video like this (and on a deadline) so please excuse any minor mistakes. Feel free to contact me about any of the information in the video.
