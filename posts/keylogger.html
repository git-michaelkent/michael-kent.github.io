# bash-keylogger
<p>https://github.com/git-michaelkent/bash-keylogger/blob/main/logger.sh</p>

# About:
I created a self contained bash keylogger for a class assignment, which not only captures keyboard inputs, but also button presses from a trackpad/mouse. When I was first brainstorming this script I wanted it to completely "live off the land", which is why I chose to develop it in Bash. A slight hiccup in this idea was reading the /dev/input/event files (which track the raw inputs of connected devices). Reading raw data from event files proved too difficult for the timeframe of this assignment. This prompted me to use evtest instead, which is unfortunately not installed by default on many distros. I partly resolved this issue by automatically installing evtest if not found. I then took the approach to track all event files, as the event file a device writes to is continually shifting for any given device. To help with clarity, logs indicate which event file they originate from.

# Assignment Instructions:
> You will be writing your own keystroke logger.  You can use any programming language you choose.  The TAs and I have used Python.  Your requirements are:
>1.  Your program must write the keystrokes to a file.
2.  Your program must timestamp each keypress.
3.  Your code must be commented.

# Pseudocode:
Checks to see if it is run as root. This is needed for evtest and potential evtest installation.

Ctrl-c termination is caught, allowing for a safe exit of any running evtest processes - or else they will continue appending in the background.

Check if evtest is installed. If not, it is automatically installed using which ever (common) package manager is available on the device.

Generate the log file and make sure it can be accessed by non-root users (since it is generated by root).

Create an evtest instance for every event file.

Use a handler function to process the evtest outputs, appending only the desired key inputs to a txt log.

Handler also adds a date to every line.

# Script Requirements:
- Linux, or maybe MacOS (untested)
- Root/sudo (how dare linux securely protect raw inputs lol)
- evtest installed
   - Otherwise must have apt, apt-get, yum, dnf, pacman, or brew
 - Not a vm (didn't seem to work in my testing)
